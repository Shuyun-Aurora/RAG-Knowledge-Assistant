<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 径向渐变作为背景 -->
        <radialGradient id="purpleGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#9370DB" /> <!-- 亮紫色 -->
            <stop offset="100%" stop-color="#4B0082" /> <!-- 深紫色 -->
        </radialGradient>

        <!-- 线性渐变用于线条和节点 -->
        <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#DA70D6" /> <!-- 兰花紫 -->
            <stop offset="100%" stop-color="#8A2BE2" /> <!-- 亮蓝色 -->
        </linearGradient>

        <!-- 滤镜实现发光效果 -->
        <filter id="glow">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 带有径向渐变的背景矩形 -->
    <rect x="0" y="0" width="600" height="400" fill="url(#purpleGradient)" />

    <!-- 抽象节点和连接线 -->
    <!-- 节点 1-6 -->
    <circle cx="100" cy="100" r="15" fill="#E6E6FA" filter="url(#glow)" />
    <circle cx="250" cy="50" r="15" fill="#E6E6FA" filter="url(#glow)" />
    <circle cx="400" cy="150" r="15" fill="#E6E6FA" filter="url(#glow)" />
    <circle cx="500" cy="300" r="15" fill="#E6E6FA" filter="url(#glow)" />
    <circle cx="150" cy="350" r="15" fill="#E6E6FA" filter="url(#glow)" />
    <circle cx="300" cy="250" r="15" fill="#E6E6FA" filter="url(#glow)" />
    
    <!-- 新增节点 -->
    <circle cx="50" cy="250" r="12" fill="#E6E6FA" filter="url(#glow)" opacity="0.8" />
    <circle cx="550" cy="100" r="12" fill="#E6E6FA" filter="url(#glow)" opacity="0.8" />
    <circle cx="450" cy="380" r="12" fill="#E6E6FA" filter="url(#glow)" opacity="0.8" />
    <circle cx="200" cy="200" r="12" fill="#E6E6FA" filter="url(#glow)" opacity="0.8" />

    <!-- 连接节点的线条 -->
    <line x1="100" y1="100" x2="250" y2="50" stroke="url(#lineGradient)" stroke-width="2" opacity="0.7" />
    <line x1="250" y1="50" x2="400" y2="150" stroke="url(#lineGradient)" stroke-width="2" opacity="0.7" />
    <line x1="400" y1="150" x2="500" y2="300" stroke="url(#lineGradient)" stroke-width="2" opacity="0.7" />
    <line x1="500" y1="300" x2="300" y2="250" stroke="url(#lineGradient)" stroke-width="2" opacity="0.7" />
    <line x1="300" y1="250" x2="150" y2="350" stroke="url(#lineGradient)" stroke-width="2" opacity="0.7" />
    <line x1="150" y1="350" x2="100" y2="100" stroke="url(#lineGradient)" stroke-width="2" opacity="0.7" />
    <line x1="250" y1="50" x2="300" y2="250" stroke="url(#lineGradient)" stroke-width="2" opacity="0.7" />
    <line x1="100" y1="100" x2="300" y2="250" stroke="url(#lineGradient)" stroke-width="2" opacity="0.7" />
    
    <!-- 新增连接线 -->
    <line x1="50" y1="250" x2="150" y2="350" stroke="url(#lineGradient)" stroke-width="1.5" opacity="0.6" />
    <line x1="50" y1="250" x2="200" y2="200" stroke="url(#lineGradient)" stroke-width="1.5" opacity="0.6" />
    <line x1="550" y1="100" x2="400" y2="150" stroke="url(#lineGradient)" stroke-width="1.5" opacity="0.6" />
    <line x1="550" y1="100" x2="500" y2="300" stroke="url(#lineGradient)" stroke-width="1.5" opacity="0.6" />
    <line x1="450" y1="380" x2="300" y2="250" stroke="url(#lineGradient)" stroke-width="1.5" opacity="0.6" />
    <line x1="450" y1="380" x2="150" y2="350" stroke="url(#lineGradient)" stroke-width="1.5" opacity="0.6" />
    <line x1="200" y1="200" x2="250" y2="50" stroke="url(#lineGradient)" stroke-width="1.5" opacity="0.6" />
    <line x1="200" y1="200" x2="400" y2="150" stroke="url(#lineGradient)" stroke-width="1.5" opacity="0.6" />

    <!-- 抽象电路线条 -->
    <path d="M50 200 Q150 150 200 200 T350 250" fill="none" stroke="#BA55D3" stroke-width="1" opacity="0.3" />
    <path d="M550 100 Q450 150 400 100 T250 50" fill="none" stroke="#BA55D3" stroke-width="1" opacity="0.3" />
    <path d="M100 300 Q200 380 300 300 T500 200" fill="none" stroke="#BA55D3" stroke-width="0.8" opacity="0.2" />
    <path d="M500 50 Q400 10 300 50 T100 150" fill="none" stroke="#BA55D3" stroke-width="0.8" opacity="0.2" />

    <!-- 中央的"AI"核心 -->
    <circle cx="300" cy="200" r="50" fill="transparent" stroke="#E6E6FA" stroke-width="1" opacity="0.1" filter="url(#glow)" />
    <circle cx="300" cy="200" r="45" fill="transparent" stroke="#E6E6FA" stroke-width="2" opacity="0.2" filter="url(#glow)" />
    <circle cx="300" cy="200" r="40" fill="transparent" stroke="url(#lineGradient)" stroke-width="3" filter="url(#glow)" />
    <text x="300" y="215" font-family="Arial, sans-serif" font-size="30" fill="#E6E6FA" text-anchor="middle" filter="url(#glow)" style="text-shadow: 0 0 10px #9370DB;">AI</text>
    
    <!-- 围绕AI的小点 -->
    <circle cx="280" cy="180" r="3" fill="#E6E6FA" opacity="0.6" filter="url(#glow)" />
    <circle cx="320" cy="220" r="3" fill="#E6E6FA" opacity="0.6" filter="url(#glow)" />
    <circle cx="310" cy="170" r="3" fill="#E6E6FA" opacity="0.6" filter="url(#glow)" />
    <circle cx="290" cy="230" r="3" fill="#E6E6FA" opacity="0.6" filter="url(#glow)" />

    <!-- 背景中分散的微小数据点 -->
    <circle cx="70" cy="30" r="2" fill="#E6E6FA" opacity="0.15" />
    <circle cx="180" cy="10" r="2" fill="#E6E6FA" opacity="0.15" />
    <circle cx="530" cy="60" r="2" fill="#E6E6FA" opacity="0.15" />
    <circle cx="40" cy="380" r="2" fill="#E6E6FA" opacity="0.15" />
    <circle cx="580" cy="350" r="2" fill="#E6E6FA" opacity="0.15" />
    <circle cx="350" cy="30" r="2" fill="#E6E6FA" opacity="0.15" />
    <circle cx="20" cy="150" r="2" fill="#E6E6FA" opacity="0.15" />
</svg> 